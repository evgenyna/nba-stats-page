
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Player Statistics</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #333; text-align: center; margin-bottom: 30px; }
        .control-group { margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .control-group select, .download-link, .ui-button { padding: 10px 15px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; cursor: pointer; background-color: #f8f8f8; color: #333; }
        .control-group .download-link { background-color: #007bff; color: white; text-decoration: none; border: none; }
        .control-group .download-link:hover { background-color: #0056b3; }
        .table-container { overflow-x: auto; margin-top: 20px; }
        .table { width: 100%; border-collapse: collapse; min-width: 1200px; /* Ensure horizontal scroll for many columns */ }
        .table thead th { background-color: #f2f2f2; text-align: center; padding: 10px; border: 1px solid #ddd; position: sticky; top: 0; z-index: 1; }
        .table tbody tr:nth-of-type(odd) { background-color: #f9f9f9; }
        .table td { border: 1px solid #ddd; padding: 8px; text-align: right; white-space: nowrap; }
        .table td:first-child { text-align: left; }
    </style>
</head>
<body>
    <h1>NBA Player Statistics (2025-26 Regular Season)</h1>
    <div class="control-group">
        <select id="seasonFilter" onchange="filterTable()">
            <option value="all">All Seasons</option>
            <option value="2025-26">2025-26</option><option value="2024-25">2024-25</option>
        </select>
        <select id="teamFilter" onchange="filterTable()">
            <option value="all">All Teams</option>
            <option value="TOR">TOR</option><option value="MIL">MIL</option><option value="DAL">DAL</option><option value="DEN">DEN</option><option value="HOU">HOU</option><option value="IND">IND</option><option value="OKC">OKC</option><option value="UTA">UTA</option><option value="PHI">PHI</option><option value="LAL">LAL</option><option value="GSW">GSW</option><option value="WAS">WAS</option><option value="BOS">BOS</option><option value="PHX">PHX</option><option value="MIA">MIA</option><option value="CHI">CHI</option><option value="ORL">ORL</option><option value="MIN">MIN</option><option value="CHA">CHA</option><option value="NYK">NYK</option><option value="ATL">ATL</option><option value="DET">DET</option><option value="BKN">BKN</option><option value="LAC">LAC</option><option value="SAS">SAS</option><option value="POR">POR</option><option value="MEM">MEM</option><option value="NOP">NOP</option><option value="CLE">CLE</option><option value="SAC">SAC</option>
        </select>
        <a href="data:text/csv;charset=utf-8,{encoded_csv_data}" download="nba_player_stats.csv" class="download-link">Download CSV</a>
    </div>
    <div class="table-container">
        {html_table}
    </div>

    <script>
        const seasonFilter = document.getElementById('seasonFilter');
        const teamFilter = document.getElementById('teamFilter');
        const tableBody = document.querySelector('.table tbody');
        const rows = tableBody ? tableBody.querySelectorAll('tr') : [];

        function filterTable() {
            const selectedSeason = seasonFilter.value;
            const selectedTeam = teamFilter.value;

            rows.forEach(row => {
                const seasonCell = row.cells[{season_col_index}]; // Assuming SEASON_NAME is at this index
                const teamCell = row.cells[{team_col_index}]; // Assuming TEAM_ABBREVIATION is at this index

                const rowSeason = seasonCell ? seasonCell.textContent.trim() : '';
                const rowTeam = teamCell ? teamCell.textContent.trim() : '';

                const seasonMatch = (selectedSeason === 'all' || rowSeason === selectedSeason);
                const teamMatch = (selectedTeam === 'all' || rowTeam === selectedTeam);

                if (seasonMatch && teamMatch) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        }
        // Initial filter on page load
        filterTable();
    </script>
</body>
</html>
